<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Area Locations Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet Heat plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        #map {
            width: 100%;
            height: 100vh;
        }
        
        .legend {
            padding: 10px;
            background: white;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            border-radius: 5px;
            line-height: 24px;
            color: #333;
            max-width: 280px;
        }
        
        .legend h4 {
            margin: 0 0 10px 0;
            text-align: center;
        }
        
        .legend i {
            width: 20px;
            height: 20px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .legend-item span {
            margin-right: 8px;
        }
        
        .emoji-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        
        .info {
            padding: 10px;
            background: white;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            border-radius: 5px;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
